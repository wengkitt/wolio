<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Change Password</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>New Password</mat-label>
          <input
            matInput
            type="password"
            formControlName="newPassword"
            placeholder="Enter your new password"
          />
          <mat-error
            *ngIf="changePasswordForm.get('newPassword')?.hasError('required')"
          >
            New password is required
          </mat-error>
          <mat-error
            *ngIf="changePasswordForm.get('newPassword')?.hasError('minlength')"
          >
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirm New Password</mat-label>
          <input
            matInput
            type="password"
            formControlName="confirmPassword"
            placeholder="Confirm your new password"
          />
          <mat-error
            *ngIf="
              changePasswordForm.get('confirmPassword')?.hasError('required')
            "
          >
            Please confirm your new password
          </mat-error>
          <mat-error *ngIf="changePasswordForm.hasError('mismatch')">
            Passwords do not match
          </mat-error>
        </mat-form-field>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="!changePasswordForm.valid"
        >
          Change Password
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
